<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Track & Analyze</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Inter', sans-serif; }
    h1 { font-family: 'Special Elite', serif; }
  </style>
</head>
<body class="bg-[#e8e8e4] min-h-screen">

  <header class="bg-white w-full flex items-stretch" style="height:52px;">
    <div class="flex items-center pl-4 pr-6 gap-6">
      <div class="w-[34px] h-[34px] rounded-full bg-[#151515] flex items-center justify-center flex-shrink-0">
        <span class="text-white text-[12px] font-bold">i8</span>
      </div>
      <nav class="flex items-center gap-6 text-[13px] font-medium text-[#151515]">
        <a href="#" class="hover:opacity-60 transition-opacity">About us</a>
        <a href="#" class="hover:opacity-60 transition-opacity">How it works</a>
        <a href="#" class="hover:opacity-60 transition-opacity">Pricing</a>
        <a href="#" class="hover:opacity-60 transition-opacity">FAQs</a>
      </nav>
    </div>
    <div class="flex-1"></div>
    <div class="flex items-stretch">
      <a href="#" class="flex items-center justify-center px-8 text-[13px] font-medium text-[#151515] hover:bg-gray-100 transition-colors whitespace-nowrap">
        Login
      </a>
      <a href="#" class="flex items-center justify-center px-7 text-[13px] font-semibold text-white bg-[#151515] hover:bg-black transition-colors whitespace-nowrap">
        Sign Up
      </a>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-8 pt-16 pb-20 flex items-center justify-between gap-10">
    <div class="max-w-[460px]">
      <h1 class="text-[52px] leading-[1.1] text-[#151515] mb-5">
        Always Track &amp;<br/>
        Analyze Your Business<br/>
        Statistics To Succeed.
      </h1>
      <p class="text-[14px] text-[#444] leading-relaxed mb-8">
        A better way to manage your sales, team, clients &amp; marketing<br/>
        — on a single platform. Powerful, affordable &amp; easy.
      </p>
      <div class="flex mb-10" style="max-width:320px;">
        <input
          type="email"
          placeholder="Enter your email"
          class="flex-1 border border-[#151515] px-4 py-2.5 text-[13px] text-[#151515] bg-white outline-none placeholder-gray-400"
        />
        <button class="bg-[#151515] text-white px-5 py-2.5 text-[13px] font-semibold whitespace-nowrap hover:bg-black transition-colors">
          Get started
        </button>
      </div>
      <div class="flex items-center gap-5">
        <span class="text-[22px] font-black tracking-tight text-[#151515]">VISA</span>
        <div class="flex items-center">
          <div class="w-[26px] h-[26px] rounded-full bg-[#151515]"></div>
          <div class="w-[26px] h-[26px] rounded-full bg-[#777] -ml-3"></div>
        </div>
        <div class="flex items-center gap-1">
          <span class="text-[#151515] font-bold text-[15px] italic">P</span>
          <span class="text-[#151515] font-semibold text-[14px]">PayPal</span>
        </div>
      </div>
    </div>

    <div class="hidden md:flex flex-1 items-center justify-center">
      <img src="./Illustration_1.svg" alt="hero illustration" class="w-full max-w-[340px] h-auto object-contain"/>
    </div>
  </main>

</body>
</html>
